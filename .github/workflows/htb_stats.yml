      - name: Fetch HTB Data and Update README
        run: |
          python - << 'EOF'
          import requests
          import json

          # Tu UUID exacto
          uuid = "019ca207-b376-73f7-8db1-fece98e53cd6"
          
          # Endpoint público de la nueva plataforma de perfiles
          url = f"https://profile.hackthebox.com/api/v1/profile/public/{uuid}"
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "application/json"
          }

          try:
              response = requests.get(url, headers=headers, timeout=15)
              data = response.json()
              
              # Extraemos los datos reales del JSON de la API
              # 'rank' nos da tu nivel/rango (ej. Noob, Script Kiddie, etc.)
              rango = data.get("profile", {}).get("rank", "Noob")
              
              # Reemplazamos espacios por guiones bajos para que la URL de Shields.io no se rompa
              rango_badge = rango.replace(" ", "_")
              
              # Construimos la URL del badge dinámico mostrando solo tu Nivel/Rango
              badge_url = f"https://img.shields.io/badge/Hack_The_Box-{rango_badge}-9fe2bf?style=for-the-badge&logo=hackthebox&logoColor=white"
              
              # Leer y actualizar el README
              with open("README.md", "r", encoding="utf-8") as f:
                  readme = f.read()

              start_marker = "<!-- HTB_STAT_START -->"
              end_marker = "<!-- HTB_STAT_END -->"

              if start_marker in readme and end_marker in readme:
                  before = readme.split(start_marker)[0]
                  after = readme.split(end_marker)[1]
                  
                  # El enlace te mandará a tu perfil y el badge mostrará tu nivel real actualizado
                  profile_url = f"https://profile.hackthebox.com/profile/{uuid}"
                  new_badge_html = f'<a href="{profile_url}"><img src="{badge_url}" alt="HTB Status" /></a>'
                  updated_readme = f"{before}{start_marker}\n{new_badge_html}\n{end_marker}{after}"
                  
                  with open("README.md", "w", encoding="utf-8") as f:
                      f.write(updated_readme)
                  print(f"README actualizado con éxito. Rango detectado: {rango}")
              else:
                  print("No se encontraron los marcadores en el README.")
          except Exception as e:
              print(f"Error al obtener datos reales de la API: {e}")
          EOF
          
