name: Update HTB Stats Automatically

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch HTB Data and Update README
        run: |
          python - << 'EOF'
          import requests
          import re
          import json
          import os

          uuid = "019ca207-b376-73f7-8db1-fece98e53cd6"
          url = f"https://profile.hackthebox.com/profile/{uuid}"
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "text/html"
          }

          print("[+] Conectando con Hack The Box...")
          response = requests.get(url, headers=headers, timeout=15)
          html = response.text
          
          # Valores por defecto dinámicos
          rango = "Beginner"
          nivel = "1"
          logros_count = "0"
          grado_texto = "♦︎♦︎♦︎"

          # 1. Extraer Rango
          for r in ["Noob", "Beginner", "Script Kiddie", "User", "Hacker", "Pro Hacker", "Elite Hacker", "Guru", "Omniscient"]:
              if r in html:
                  rango = r
                  break

          # 2. Extraer Nivel de forma segura
          level_matches = re.findall(r'"level"\s*:\s*(\d+)', html)
          if level_matches:
              nivel = level_matches[0]

          # 3. Extraer Logros
          badge_matches = re.findall(r'"badge_id"\s*:', html)
          if badge_matches:
              logros_count = str(len(badge_matches))
          else:
              count_match = re.search(r'"badges_count"\s*:\s*(\d+)', html)
              if count_match:
                  logros_count = count_match.group(1)

          # 4. Extraer Grado
          grade_match = re.search(r'"grade"\s*:\s*(\d+)', html)
          if grade_match:
              grado_texto = "♦" * int(grade_match.group(1))

          # --- INYECCIÓN LINEAL SEGURA (PROHIBIDO DUPLICAR) ---
          if not os.path.exists("README.md"):
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write("\n\n\n")

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          # Forzar creación de tags si no existen de forma limpia
          if "" not in readme:
              readme = "\n\n" + readme
          if "" not in readme:
              readme = readme + "\n\n"

          # Formatear el nuevo Badge y la nueva Tabla
          texto_badge = f"{rango}_|_Lvl_{nivel}".replace(" ", "_")
          badge_url = f"https://img.shields.io/badge/Hack_The_Box-{texto_badge}-9fe2bf?style=for-the-badge&logo=hackthebox&logoColor=white"
          profile_url = f"https://profile.hackthebox.com/profile/{uuid}"
          
          new_badge = f'\n<a href="{profile_url}"><img src="{badge_url}" alt="HTB Status" /></a>\n'
          
          nueva_tabla = (
              "\n"
              "| Métrica | Estado |\n"
              "| :--- | :--- |\n"
              f"| 🏅 **Rango Global** | {rango} |\n"
              f"| ⚡ **Nivel de XP** | Lvl {nivel} |\n"
              f"| 🏆 **Logros Obtenidos** | {logros_count} |\n"
              f"| 💎 **Grado Actual** | {grado_texto} |\n"
              ""
          )

          # Reemplazo estricto por rebanado de strings (Split exacto)
          try:
              parts_badge = readme.split("")
              sub_parts = parts_badge[1].split("")
              readme = parts_badge[0] + new_badge + sub_parts[1]

              parts_table = readme.split("")
              sub_table = parts_table[1].split("")
              readme = parts_table[0] + nueva_tabla + sub_table[1]
          except Exception as split_err:
              print(f"[-] Reemplazo falló, regenerando estructura limpia: {split_err}")
              readme = f"{new_badge}\n\n{nueva_tabla}"

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          
          print(f"[+] Sincronización finalizada correctamente.")
          EOF

      - name: Commit changes safely
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "[+] Cambios reales detectados. Haciendo push..."
            git commit -m "profile: dynamic auto-injection of HTB summary metrics"
            git push origin HEAD
          else
            echo "[+] Archivo idéntico. Sin cambios."
          fi
          
