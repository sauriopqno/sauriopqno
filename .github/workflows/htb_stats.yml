name: Update HTB Stats Automatically

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Fetch HTB Data and Update README
        run: |
          python - << 'EOF'
          import requests
          import re
          import json
          import os

          uuid = "019ca207-b376-73f7-8db1-fece98e53cd6"
          url = f"https://profile.hackthebox.com/profile/{uuid}"
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "text/html"
          }

          print("[+] Conectando con Hack The Box...")
          response = requests.get(url, headers=headers, timeout=15)
          html = response.text
          
          # Valores dinámicos por defecto
          rango = "Beginner"
          nivel = "1"
          logros_count = "0"
          grado_texto = "♦︎♦︎♦︎"

          # 1. Extracción de Rango Avanzada (Mapeo por palabras clave visibles en HTML)
          for r in ["Noob", "Beginner", "Script Kiddie", "User", "Hacker", "Pro Hacker", "Elite Hacker", "Guru", "Omniscient"]:
              if r in html:
                  rango = r
                  break

          # 2. Extracción de Nivel usando Regex sobre texto o JSON inyectado
          # Busca patrones como "level":13, "level": 13, u objetos planos en el JS de Nuxt
          level_matches = re.findall(r'"level"\s*:\s*(\d+)', html) or re.findall(r'level.*?(\d+)', html)
          if level_matches:
              # Filtramos para evitar capturar ID's falsos y tomar el nivel real (normalmente menor a 200)
              valid_levels = [l for l in level_matches if int(l) < 150]
              if valid_levels:
                  nivel = valid_levels[0]

          # 3. Extracción de Logros (Contador de insignias/badges)
          # Contamos las incidencias de objetos de medallas renderizados o la propiedad explícita
          badge_matches = re.findall(r'"badge_id"\s*:', html) or re.findall(r'badge-card', html)
          if badge_matches and len(badge_matches) > 0:
              logros_count = str(len(badge_matches))
          else:
              # Fallback por propiedad de conteo
              count_match = re.search(r'"badges_count"\s*:\s*(\d+)', html) or re.search(r'"achievements_count"\s*:\s*(\d+)', html)
              if count_match:
                  logros_count = count_match.group(1)

          # 4. Extracción de Grado (Grade)
          grade_match = re.search(r'"grade"\s*:\s*(\d+)', html)
          if grade_match:
              num_grade = int(grade_match.group(1))
              grado_texto = "♦" * num_grade if num_grade > 0 else "♦︎♦︎♦"
          else:
              # Si no se encuentra numérico, intentamos contar diamantes gráficos o dejar el estándar de 3
              grado_texto = "♦︎♦︎♦︎"

          # --- PROCESO DE INYECCIÓN SEGURO EN EL README ---
          if os.path.exists("README.md"):
              with open("README.md", "r", encoding="utf-8") as f:
                  readme = f.read()
          else:
              readme = "# My Profile\n\n\n\n\n\n"

          if "" not in readme:
              readme = "\n\n\n" + readme
          if "" not in readme:
              readme = readme + "\n\n\n"

          texto_badge = f"{rango}_|_Lvl_{nivel}".replace(" ", "_")
          badge_url = f"https://img.shields.io/badge/Hack_The_Box-{texto_badge}-9fe2bf?style=for-the-badge&logo=hackthebox&logoColor=white"
          profile_url = f"https://profile.hackthebox.com/profile/{uuid}"
          new_badge_html = f'\n<a href="{profile_url}"><img src="{badge_url}" alt="HTB Status" /></a>\n'

          nueva_tabla = (
              "\n"
              "### 📊 Hack The Box Detailed Progress\n"
              "| Métrica | Estado |\n"
              "| :--- | :--- |\n"
              f"| 🏅 **Rango Global** | {rango} |\n"
              f"| ⚡ **Nivel de XP** | Lvl {nivel} |\n"
              f"| 🏆 **Logros Obtenidos** | {logros_count} |\n"
              f"| 💎 **Grado Actual** | {grado_texto} |\n"
              ""
          )

          readme = re.sub(r'.*?', new_badge_html, readme, flags=re.DOTALL)
          readme = re.sub(r'.*?', nueva_tabla, readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          
          print(f"[+] Sincronización finalizada -> Rango: {rango} | Lvl: {nivel} | Logros: {logros_count}")
          EOF

      
          
          

      - name: Check Git Status
        run: |
          git status
          git diff README.md

      - name: Commit changes safely
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "[+] Cambios detectados en el perfil. Guardando..."
            git commit -m "profile: dynamic auto-injection of HTB summary metrics"
            git push origin HEAD
          else
            echo "[+] Las estadísticas de HTB siguen idénticas. No se requiere commit."
          fi
          
